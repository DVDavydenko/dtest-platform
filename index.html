<!DOCTYPE html>
<html lang="uk">
<head>
<meta charset="UTF-8">
<title>Практична робота</title>

<script src="https://cdn.jsdelivr.net/npm/chart.js"></script>

<style>
body{font-family:sans-serif;max-width:800px;margin:auto;padding:20px}
.hidden{display:none}
textarea{width:100%;height:120px;margin:10px 0}
button{padding:10px;margin-top:10px}
</style>
</head>

<body>

<h2>Практична робота</h2>

<div id="start">
<input id="name" placeholder="ПІБ"><br><br>
<input id="classInput" placeholder="Клас"><br><br>
<input id="code" placeholder="Код"><br><br>

<button id="startBtn">Старт</button>
</div>

<div id="test" class="hidden">
<p id="timer"></p>

<h3>Частина 1</h3>
<textarea id="p1"></textarea>

<h3>Частина 2</h3>
<textarea id="p2"></textarea>

<h3>Частина 3</h3>
<textarea id="p3"></textarea>

<button id="finishBtn">Завершити</button>
</div>

<div id="result" class="hidden">
<h3>Результат</h3>
<div id="final"></div>
<canvas id="chart"></canvas>
</div>

<script>

const SCRIPT_URL = "https://script.google.com/macros/s/AKfycbx8zLs4aiWkxUi-c9q9l9MrXfG379Jw1cRwoU7ORADlbT3-MnXqLZJcuG2nwbzaotdE/exec";

let startTime;
let timerInterval;

// ===== СТАРТ =====
document.getElementById("startBtn").addEventListener("click", startTest);

function startTest(){

const name = document.getElementById("name").value;
const className = document.getElementById("classInput").value;
const code = document.getElementById("code").value;

fetch(SCRIPT_URL,{
method:"POST",
headers:{'Content-Type':'application/json'},
body:JSON.stringify({
action:"checkAttempt",
name:name,
code:code
})
})
.then(r=>r.text())
.then(res=>{

if(res==="BLOCK"){
alert("Ви вже проходили тест");
return;
}

if(res==="NOT_FOUND"){
alert("Невірні дані");
return;
}

document.getElementById("start").classList.add("hidden");
document.getElementById("test").classList.remove("hidden");

startTime = Date.now();
startTimer();

});

}

// ===== ТАЙМЕР =====
function startTimer(){

timerInterval = setInterval(()=>{

let t = 2400 - Math.floor((Date.now()-startTime)/1000);
document.getElementById("timer").innerText = "Час: "+t;

if(t<=0){
clearInterval(timerInterval);
finish();
}

},1000);

}

// ===== ФІНІШ =====
document.getElementById("finishBtn").addEventListener("click", finish);

function finish(){

clearInterval(timerInterval);

const name = document.getElementById("name").value;
const className = document.getElementById("classInput").value;
const code = document.getElementById("code").value;

fetch(SCRIPT_URL,{
method:"POST",
headers:{'Content-Type':'application/json'},
body:JSON.stringify({
action:"submit",
name:name,
class:className,
code:code,
p1:document.getElementById("p1").value,
p2:document.getElementById("p2").value,
p3:document.getElementById("p3").value,
time:Math.floor((Date.now()-startTime)/1000)
})
})
.then(r=>r.json())
.then(ai=>{

document.getElementById("test").classList.add("hidden");
document.getElementById("result").classList.remove("hidden");

document.getElementById("final").innerHTML = `
Бал: ${ai.total}/12 <br>
Рівень: ${ai.level}<br><br>
${ai.comment}
`;

new Chart(document.getElementById("chart"),{
type:"bar",
data:{
labels:["1","2","3"],
datasets:[{data:[ai.p1,ai.p2,ai.p3]}]
}
});

});

}

</script>

</body>
</html>
