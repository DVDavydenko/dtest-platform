<!DOCTYPE html>
<html lang="uk">
<head>
<meta charset="UTF-8">
<title>Практична робота (AI)</title>

<script src="https://cdn.jsdelivr.net/npm/chart.js"></script>

<style>
body{font-family:sans-serif;max-width:800px;margin:auto;padding:20px}
.hidden{display:none}
textarea{width:100%;height:120px;margin:10px 0}
button{padding:10px;margin-top:10px}
</style>
</head>

<body>

<h2>Практична робота</h2>

<div id="start">
<input id="name" placeholder="Прізвище Ім'я"><br><br>
<input id="class" placeholder="Клас"><br><br>
<input id="code" placeholder="Код доступу"><br><br>

<button onclick="startTest()">Старт</button>
</div>

<div id="test" class="hidden">

<p id="timer"></p>

<h3>Частина 1</h3>
<textarea id="p1"></textarea>

<h3>Частина 2</h3>
<textarea id="p2"></textarea>

<h3>Частина 3</h3>
<textarea id="p3"></textarea>

<button onclick="finish()">Завершити</button>

</div>

<div id="result" class="hidden">
<h3>Результат</h3>
<div id="final"></div>
<canvas id="chart"></canvas>
</div>

<script>

const SCRIPT_URL="ВСТАВ_СВІЙ_URL";
const ACCESS_CODE="1234";

let startTime;
let timeLimit=40*60;
let timerInterval;

function startTest(){

if(code.value!==ACCESS_CODE){
alert("Невірний код");
return;
}

fetch(SCRIPT_URL,{
method:"POST",
body:JSON.stringify({
action:"checkAttempt",
name:name.value
})
})
.then(r=>r.text())
.then(res=>{
if(res==="BLOCK"){
alert("Ви вже проходили тест");
return;
}

start.classList.add("hidden");
test.classList.remove("hidden");

startTime=Date.now();
startTimer();

});
}

function startTimer(){
timerInterval=setInterval(()=>{
let t=timeLimit-Math.floor((Date.now()-startTime)/1000);
timer.innerText="Час: "+t+" сек";

if(t<=0){
clearInterval(timerInterval);
finish();
}
},1000);
}

function finish(){

clearInterval(timerInterval);

fetch(SCRIPT_URL,{
method:"POST",
headers:{'Content-Type':'application/json'},
body:JSON.stringify({
action:"submit",
name:name.value,
class:class.value,
p1:p1.value,
p2:p2.value,
p3:p3.value,
time:Math.floor((Date.now()-startTime)/1000)
})
})
.then(r=>r.json())
.then(ai=>{

test.classList.add("hidden");
result.classList.remove("hidden");

final.innerHTML=`
Бал: ${ai.total}/12 <br>
Рівень: ${ai.level}<br><br>
${ai.comment}
`;

new Chart(chart,{
type:"bar",
data:{
labels:["1","2","3"],
datasets:[{data:[ai.p1,ai.p2,ai.p3]}]
}
});

});
}

</script>

</body>
</html>
