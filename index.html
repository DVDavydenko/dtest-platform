<!DOCTYPE html>
<html lang="uk">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Практична робота 9 клас</title>
<script src="https://cdn.tailwindcss.com"></script>
<script src="https://cdn.jsdelivr.net/npm/chart.js"></script>
</head>

<body class="bg-slate-100 p-4">

<div class="max-w-3xl mx-auto bg-white p-6 rounded-xl shadow">

<h1 class="text-2xl font-bold mb-4">🏛️ Практична робота</h1>

<!-- AUTH -->
<div id="auth">
<input id="name" placeholder="Прізвище Ім'я" class="border p-2 w-full mb-2">
<input id="class" placeholder="Клас (9-А)" class="border p-2 w-full mb-2">
<input id="code" placeholder="Код доступу" class="border p-2 w-full mb-2">
<button onclick="start()" class="bg-blue-600 text-white px-4 py-2 rounded">Старт</button>
<p id="error" class="text-red-600"></p>
</div>

<!-- TEST -->
<div id="test" class="hidden">
<p>⏱ <span id="timer">40:00</span></p>
<div id="question"></div>
</div>

<!-- RESULT -->
<div id="result" class="hidden">
<h2 class="text-xl font-bold">Результат</h2>
<p id="final"></p>
<canvas id="chart"></canvas>
</div>

</div>

<script>
const SCRIPT_URL = "ВСТАВ_СВІЙ_APPS_SCRIPT_URL";
const ACCESS_CODE = "1234";

let student={},score=0,index=0,startTime;

let questions=[
{q:"Хто за самостійність?",a:["Міхновський","Грушевський"],c:0},
{q:"РУП це?",a:["соціалісти","монархісти"],c:0},
{q:"Автономія це?",a:["самоврядування","незалежність"],c:0}
];

function start(){
let n=name.value.trim();
let c=class.value.trim();
let cd=code.value.trim();

if(n.split(" ").length<2){error.innerText="Введи ПІБ";return;}
if(cd!==ACCESS_CODE){error.innerText="Невірний код";return;}

student={n,c};
startTime=Date.now();

auth.style.display="none";
test.classList.remove("hidden");

timerStart();
next();
}

function timerStart(){
let t=2400;
setInterval(()=>{
t--;
timer.innerText=Math.floor(t/60)+":"+String(t%60).padStart(2,'0');
if(t<=0) finish();
},1000);
}

function next(){
if(index>=questions.length){finish();return;}

let q=questions[index];
question.innerHTML=`<p>${q.q}</p>`+
q.a.map((x,i)=>`<button onclick="ans(${i===q.c})" class="block border p-2 mt-2 w-full">${x}</button>`).join("");
index++;
}

function ans(c){
if(c) score++;
next();
}

async function finish(){

test.classList.add("hidden");

let grade=Math.round((score/questions.length)*12);
let time=Math.floor((Date.now()-startTime)/1000);

let res=await fetch(SCRIPT_URL,{
method:"POST",
body:JSON.stringify({
name:student.n,
class:student.c,
score:score,
grade:grade,
timeSpent:time,
project:"history9"
})
});

let data=await res.json();

result.classList.remove("hidden");

if(data.status==="denied"){final.innerText="Немає у списку";return;}
if(data.status==="exists"){final.innerText="Вже проходив";return;}

final.innerText=`${student.n} → ${grade} балів`;

new Chart(document.getElementById('chart'),{
type:'bar',
data:{labels:["Бали"],datasets:[{data:[grade]}]}
});
}

window.onbeforeunload=()=>true;
</script>

</body>
</html>
</script>

</body>
</html>
